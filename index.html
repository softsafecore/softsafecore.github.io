<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viva Leve Saúde Bem-Estar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="frontend/assets/favicon.png" />
    <link rel="stylesheet" href="frontend/css/style.css" />
    <!-- Novo CSS Modular de Navegação e Rodapé -->
    <link rel="stylesheet" href="frontend/css/nav-footer.css" />
  </head>
  <body>
    <!-- Skeleton Placeholder: Evita Layout Shift (CLS) -->
    <div id="nav-skeleton" class="nav-skeleton">
      <div class="container-layout skeleton-navbar">
        <div class="skeleton-logo shimmer"></div>
        <div class="skeleton-search shimmer"></div>
        <div class="skeleton-actions">
          <div class="skeleton-item shimmer"></div>
          <div class="skeleton-item shimmer"></div>
          <div class="skeleton-btn shimmer"></div>
        </div>
      </div>
    </div>

    <main>
      <!-- Seção de Destaque (Hero) -->
      <section class="hero-section">
        <div class="hero-container">
          <div class="hero-icon">
            <img src="frontend/assets/favicon.png" alt="Viva Leve Icon" />
          </div>
          <h1 class="poppins-bold">
            BEM-VINDO À VIVA LEVE <br />SAÚDE E BEM-ESTAR!
          </h1>
          <p>Encontre a clareza necessária para transformar a sua rotina.</p>
          <div class="hero-buttons">
            <a href="#books-grid" class="btn-hero-primary">Explorar Livros</a>
            <a href="#" class="btn-hero-secondary">Saber Mais</a>
          </div>
        </div>
      </section>

      <!-- Dropdown Mobile (Exclusivo para telemóveis) -->
      <div class="mobile-category-wrapper">
        <select
          class="mobile-category-select"
          id="mobile-category-filter"
          aria-label="Filtrar por categoria"
        >
          <option value="all">Todos os Livros</option>
          <option value="alimentacao">Alimentação Saudável</option>
          <option value="conto">Conto</option>
          <option value="fantasias">Ficção & Fantasias</option>
          <option value="romance">Romance</option>
          <option value="mental">Saúde Mental & Emocional</option>
        </select>
        <i class="ph ph-caret-down select-icon"></i>
      </div>

      <!-- Filtros de Categorias Desktop -->
      <nav class="categories-nav container">
        <ul class="categories-list">
          <li>
            <a href="#" class="category-link active" data-tag="all"
              >Todos os Livros</a
            >
          </li>
          <li>
            <a href="#" class="category-link" data-tag="alimentacao"
              >Alimentação Saudável</a
            >
          </li>
          <li>
            <a href="#" class="category-link" data-tag="conto">Conto</a>
          </li>
          <li>
            <a href="#" class="category-link" data-tag="fantasias"
              >Ficção & Fantasias</a
            >
          </li>
          <li>
            <a href="#" class="category-link" data-tag="romance">Romance</a>
          </li>
          <li>
            <a href="#" class="category-link" data-tag="mental"
              >Saúde Mental & Emocional</a
            >
          </li>
        </ul>
      </nav>

      <!-- Grade de Livros (Injetada pelo JS) -->
      <section class="books-showcase container">
        <div id="books-grid" class="books-grid"></div>
      </section>
    </main>

    <!-- Canvas para o efeito de Confetti -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Botão de Acesso Administrativo (Discreto) -->
    <a
      href="frontend/pages/admin.html"
      class="floating-admin-btn"
      title="Painel Administrativo"
    >
      <i class="ph ph-gear-six"></i>
    </a>

    <!-- Menu Lateral de Favoritos (Drawer) -->
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <aside id="favorites-drawer" class="favorites-drawer">
      <div class="drawer-header">
        <h2 class="poppins-bold">MEUS FAVORITOS</h2>
        <button id="close-drawer" class="close-drawer" aria-label="Fechar menu">
          &times;
        </button>
      </div>
      <div id="drawer-content" class="drawer-content"></div>
    </aside>

    <script type="module" src="./frontend/js/app.js"></script>
    <script type="module" src="frontend/js/nav-footer.js"></script>
  </body>
</html>
